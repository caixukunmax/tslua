syntax = "proto3";

package protocol;

/**
 * 消息ID映射表
 * 用于消息路由和识别
 */
enum MessageId {
  // 系统消息 (1-99)
  UNKNOWN = 0;
  PING = 1;
  PONG = 2;
  
  // Gateway消息 (100-199)
  GATEWAY_HEARTBEAT_REQ = 100;
  GATEWAY_HEARTBEAT_RSP = 101;
  GATEWAY_CONNECT_REQ = 102;
  GATEWAY_CONNECT_RSP = 103;
  GATEWAY_DISCONNECT_NOTIFY = 104;
  
  // Login消息 (200-299)
  LOGIN_LOGIN_REQ = 200;
  LOGIN_LOGIN_RSP = 201;
  LOGIN_LOGOUT_REQ = 202;
  LOGIN_LOGOUT_RSP = 203;
  LOGIN_VALIDATE_TOKEN_REQ = 204;
  LOGIN_VALIDATE_TOKEN_RSP = 205;
  LOGIN_GET_ONLINE_COUNT_REQ = 206;
  LOGIN_GET_ONLINE_COUNT_RSP = 207;
  
  // Game消息 (300-399)
  GAME_ENTER_REQ = 300;
  GAME_ENTER_RSP = 301;
  GAME_LEAVE_REQ = 302;
  GAME_LEAVE_RSP = 303;
  GAME_GET_PLAYER_INFO_REQ = 304;
  GAME_GET_PLAYER_INFO_RSP = 305;
  GAME_UPDATE_PLAYER_REQ = 306;
  GAME_UPDATE_PLAYER_RSP = 307;
  GAME_GET_ONLINE_PLAYERS_REQ = 308;
  GAME_GET_ONLINE_PLAYERS_RSP = 309;
  GAME_ADD_EXP_REQ = 310;
  GAME_ADD_EXP_RSP = 311;
  GAME_ADD_GOLD_REQ = 312;
  GAME_ADD_GOLD_RSP = 313;
}
