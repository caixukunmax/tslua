syntax = "proto3";

package common;

/**
 * 通用消息包装
 * 所有消息都通过这个结构发送
 */
message Packet {
  uint32 msg_id = 1;        // 消息ID
  uint32 session = 2;       // 会话ID（用于请求响应匹配）
  bytes data = 3;           // 消息体（具体消息的序列化数据）
  uint64 timestamp = 4;     // 时间戳
}

/**
 * 错误码定义
 */
enum ErrorCode {
  SUCCESS = 0;              // 成功
  UNKNOWN_ERROR = 1;        // 未知错误
  INVALID_REQUEST = 2;      // 无效请求
  UNAUTHORIZED = 3;         // 未授权
  FORBIDDEN = 4;            // 禁止访问
  NOT_FOUND = 5;            // 未找到
  TIMEOUT = 6;              // 超时
  INTERNAL_ERROR = 7;       // 内部错误
  SERVICE_UNAVAILABLE = 8;  // 服务不可用
}

/**
 * 通用响应
 */
message Response {
  ErrorCode code = 1;       // 错误码
  string message = 2;       // 错误信息
  bytes data = 3;           // 响应数据
}
