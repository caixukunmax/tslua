# =============================================================================
# TS-Skynet Docker Compose 配置
# 独立部署配置 - 所有资源都在 docker/ 目录内
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Skynet 运行时容器 - 开发模式
  # 使用 volume 挂载代码，修改后无需重建镜像
  # ---------------------------------------------------------------------------
  skynet-dev:
    build:
      context: .
      dockerfile: ./skynet-runtime/Dockerfile
    container_name: tslua-skynet-dev
    restart: unless-stopped
    ports:
      - "8888:8888"   # 游戏端口
      - "9999:9999"   # 调试/管理端口
    volumes:
      # 挂载配置文件
      - ./config/skynet:/skynet-config:ro
      # 挂载 Lua 服务代码（外部编译后 copy 到 ./lua/）
      - ./lua:/skynet/lua:ro
      # 日志持久化
      - skynet-logs:/skynet/logs
    environment:
      - TZ=Asia/Shanghai
      - SKYNET_CONFIG=/skynet-config/config.tslua
    networks:
      - skynet-net
    working_dir: /skynet
    profiles:
      - dev

  # ---------------------------------------------------------------------------
  # Skynet 运行时容器 - 生产模式
  # 代码嵌入镜像，自包含部署
  # ---------------------------------------------------------------------------
  skynet:
    build:
      context: .
      dockerfile: ./skynet-runtime/Dockerfile
    container_name: tslua-skynet
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "9999:9999"
    volumes:
      - ./config/skynet:/skynet-config:ro
      - ./lua:/skynet/lua:ro  # 挂载 Lua 代码（开发时方便更新）
      - skynet-logs:/skynet/logs
    environment:
      - TZ=Asia/Shanghai
      - SKYNET_CONFIG=/skynet-config/config.tslua
    networks:
      - skynet-net
    working_dir: /skynet

networks:
  skynet-net:
    driver: bridge

volumes:
  skynet-logs:
